name: bala_aksharam
description: A modern AI-powered educational app that teaches alphabets using Indian culture, Ramayanam, and mythology.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  audioplayers: ^6.0.0
  lottie: ^3.1.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  rive: ^0.12.0
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/icons/
